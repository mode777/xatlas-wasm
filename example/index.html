<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xatlas-wasm Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 16px;
    }
    h1 { font-size: 1.4rem; color: #4a9eff; }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 8px 16px;
      border: 1px solid #4a9eff;
      background: transparent;
      color: #4a9eff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { background: #4a9eff22; }
    input[type="file"] { color: #aaa; font-size: 0.85rem; }
    .canvases {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .canvas-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .canvas-wrap label {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    canvas {
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 4px;
    }
    #progress {
      font-size: 0.85rem;
      color: #aaa;
      min-height: 1.2em;
    }
    #stats {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.8rem;
      white-space: pre;
      background: #0f0f23;
      padding: 12px 16px;
      border-radius: 4px;
      border: 1px solid #333;
      min-width: 320px;
      min-height: 2em;
    }
  </style>
</head>
<body>
  <h1>xatlas-wasm Example</h1>

  <div class="controls">
    <button id="loadDefault">Load gazebo.obj</button>
    <span style="color:#555">or</span>
    <input type="file" id="fileInput" accept=".obj">
  </div>

  <div id="progress"></div>

  <div class="canvases">
    <div class="canvas-wrap">
      <label>3D Wireframe (drag to rotate)</label>
      <canvas id="canvas3d" width="512" height="512"></canvas>
    </div>
    <div class="canvas-wrap">
      <label>UV Atlas</label>
      <canvas id="canvasUv" width="512" height="512"></canvas>
    </div>
  </div>

  <div id="stats"></div>

  <script type="module" src="main.mjs"></script>
</body>
</html>
